name: Daily Scraper
on:
  schedule:
    - cron: '0 0 * * *' # Har 24 ghante mein chalega
  workflow_dispatch: # Mobile se aap manual "Run" bhi kar sakenge

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
      - name: Run scraper
        run: python scraper.py
      - name: Commit results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add trends.csv
          git commit -m "Auto-scrape: Trending Data"
          git push
